<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>
</head>
<body>

<h1>Exam Result</h1>

<h2 id="score"></h2>

<button onclick="goHome()">
    Dashboard
</button>

<script>

document.getElementById("score")
.innerHTML =
"Your Score : " +
localStorage.getItem("score");

function goHome(){
    window.location.href =
    "dashboard.html";
}

</script>

</body>
</html>
