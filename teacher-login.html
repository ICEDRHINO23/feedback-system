<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#001f7f;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:450px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#001f5b;
    margin-bottom:10px;
}

.sub-title{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#001f5b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#003399;
}

.back-link{
    text-align:center;
    margin-top:15px;
}

.back-link a{
    text-decoration:none;
    color:#001f5b;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}

</style>
</head>

<body>

<div class="login-container">

    <h1>AHPS Online Examination System</h1>

    <p class="sub-title">
        Teacher Login
    </p>

    <label>
        Employee ID
    </label>

    <input
        type="text"
        id="employeeId"
        placeholder="Enter Employee ID">

    <label>
        Password
    </label>

    <input
        type="password"
        id="teacherPassword"
        placeholder="Enter Password">

    <button onclick="teacherLogin()">
        Login
    </button>

    <div class="back-link">
        <a href="login.html">
            ← Back to Main Login
        </a>
    </div>

    <div class="footer">
        Academic Heights Public School
    </div>

</div>

<script type="module" src="js/teacher-auth.js"></script>

</body>
</html>
