<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Examination</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#001f5b;
    color:white;
    text-align:center;
    padding:20px;
}

.header h1{
    font-size:32px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
}

.exam-info{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#timer{
    color:red;
    font-size:28px;
    font-weight:bold;
}

.question-box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.question-box h3{
    margin-bottom:20px;
    color:#001f5b;
}

.question-box label{
    display:block;
    margin:12px 0;
    cursor:pointer;
}

.question-box input[type="radio"]{
    margin-right:10px;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#001f5b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.submit-btn:hover{
    background:#003399;
}

.loading{
    text-align:center;
    padding:30px;
    font-size:20px;
}

</style>
</head>

<body>

<div class="header">
    <h1>AHPS Online Examination System</h1>
</div>

<div class="container">

    <div class="exam-info">

        <h2>Online Assessment</h2>

        <br>

        <div id="timer">
            30:00
        </div>

    </div>

    <div id="questionContainer">

        <div class="loading">
            Loading Questions...
        </div>

    </div>

    <button
        class="submit-btn"
        onclick="submitExam()">

        Submit Assessment

    </button>

</div>

<script>

let timeLeft = 1800;

const timerInterval = setInterval(() => {

    let minutes =
        Math.floor(timeLeft / 60);

    let seconds =
        timeLeft % 60;

    document.getElementById(
        "timer"
    ).innerHTML =

    `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

    timeLeft--;

    if(timeLeft < 0){

        clearInterval(
            timerInterval
        );

        alert(
            "Time Up! Assessment Submitted."
        );

        submitExam();
    }

},1000);

</script>

<script type="module" src="js/exams.js"></script>

</body>
</html>
