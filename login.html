<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AHPS Online Examination System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#001f5b,#003399);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#fff;
    width:500px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#001f5b;
    font-size:32px;
}

.logo p{
    margin-top:10px;
    color:#444;
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tab{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    background:#d9d9d9;
    font-weight:bold;
    font-size:14px;
}

.tab.active{
    background:#001f5b;
    color:white;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#001f5b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#003399;
}

#studentLogin{
    display:block;
}

#teacherLogin{
    display:none;
}

#adminLogin{
    display:none;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#444;
}

.create-account{
    text-align:center;
    margin-top:15px;
}

.create-account a{
    text-decoration:none;
    color:#001f5b;
    font-weight:bold;
}

.create-account a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>AHPS Online Examination System</h1>
        <p>Academic Year 2026-27</p>
    </div>

    <div class="tabs">

        <button
            class="tab active"
            id="studentTab"
            onclick="showStudent()">
            Student Login
        </button>

        <button
            class="tab"
            id="teacherTab"
            onclick="showTeacher()">
            Teacher Login
        </button>

        <button
            class="tab"
            id="adminTab"
            onclick="showAdmin()">
            Admin Login
        </button>

    </div>

    <!-- STUDENT LOGIN -->

    <div id="studentLogin">

        <div class="form-group">
            <label>Class</label>

            <select id="studentClass">
                <option value="">
                    Loading Classes...
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Section</label>

            <select id="section">
                <option value="">
                    Loading Sections...
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Roll Number</label>

            <input
                type="text"
                id="rollNo"
                placeholder="Enter Roll Number">
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter Password">
        </div>

        <button
            class="btn"
            onclick="login()">
            Login
        </button>

        <div class="create-account">
            New Student?
            <a href="register.html">
                Create Account
            </a>
        </div>

    </div>

    <!-- TEACHER LOGIN -->

    <div id="teacherLogin">

        <div class="form-group">
            <label>Employee ID</label>

            <input
                type="text"
                id="employeeId"
                placeholder="Enter Employee ID">
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                id="teacherPassword"
                placeholder="Enter Password">
        </div>

        <button
            class="btn"
            onclick="teacherLogin()">
            Login
        </button>

    </div>

    <!-- ADMIN LOGIN -->

    <div id="adminLogin">

        <div class="form-group">
            <label>Username</label>

            <input
                type="text"
                id="admissionNo"
                placeholder="Enter Username">
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                id="adminPassword"
                placeholder="Enter Password">
        </div>

        <button
            class="btn"
            onclick="login()">
            Login
        </button>

    </div>

    <div class="footer">
        Academic Heights Public School
    </div>

</div>

<script>

function showStudent(){

    document.getElementById(
        "studentLogin"
    ).style.display = "block";

    document.getElementById(
        "teacherLogin"
    ).style.display = "none";

    document.getElementById(
        "adminLogin"
    ).style.display = "none";

    document.getElementById(
        "studentTab"
    ).classList.add("active");

    document.getElementById(
        "teacherTab"
    ).classList.remove("active");

    document.getElementById(
        "adminTab"
    ).classList.remove("active");
}

function showTeacher(){

    document.getElementById(
        "studentLogin"
    ).style.display = "none";

    document.getElementById(
        "teacherLogin"
    ).style.display = "block";

    document.getElementById(
        "adminLogin"
    ).style.display = "none";

    document.getElementById(
        "teacherTab"
    ).classList.add("active");

    document.getElementById(
        "studentTab"
    ).classList.remove("active");

    document.getElementById(
        "adminTab"
    ).classList.remove("active");
}

function showAdmin(){

    document.getElementById(
        "studentLogin"
    ).style.display = "none";

    document.getElementById(
        "teacherLogin"
    ).style.display = "none";

    document.getElementById(
        "adminLogin"
    ).style.display = "block";

    document.getElementById(
        "adminTab"
    ).classList.add("active");

    document.getElementById(
        "studentTab"
    ).classList.remove("active");

    document.getElementById(
        "teacherTab"
    ).classList.remove("active");
}

</script>

<script type="module" src="js/login-settings.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/teacher-auth.js"></script>

</body>
</html>
