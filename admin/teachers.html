<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:20px;
}

.header h1{
    font-size:32px;
}

.container{
    width:95%;
    max-width:1300px;
    margin:25px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h2{
    margin-bottom:20px;
    color:#1e3a8a;
}

.back-btn{
    background:#1e3a8a;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.add-btn{
    width:100%;
    background:#1e3a8a;
    color:white;
    padding:12px;
    font-size:16px;
}

.add-btn:hover{
    background:#14296b;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#1e3a8a;
    color:white;
    padding:12px;
}

table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.reset-btn{
    background:orange;
    color:white;
    padding:8px 12px;
    margin-right:5px;
}

.delete-btn{
    background:red;
    color:white;
    padding:8px 12px;
}

.active{
    color:green;
    font-weight:bold;
}

.inactive{
    color:red;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#555;
}

</style>
</head>

<body>

<div class="header">
    <h1>Teacher Management</h1>
</div>

<div class="container">

    <button
        class="back-btn"
        onclick="location.href='dashboard.html'">

        ← Back To Dashboard

    </button>

    <div class="card">

        <h2>Add Teacher</h2>

        <input
            type="text"
            id="teacherName"
            placeholder="Teacher Name">

        <input
            type="text"
            id="employeeId"
            placeholder="Employee ID">

        <input
            type="text"
            id="subject"
            placeholder="Subject">

        <select id="status">

            <option value="active">
                Active
            </option>

            <option value="inactive">
                Inactive
            </option>

        </select>

        <button
            class="add-btn"
            onclick="addTeacher()">

            Add Teacher

        </button>

    </div>

    <div class="card"
         style="margin-top:20px;">

        <h2>Teachers List</h2>

        <table>

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Employee ID</th>

                    <th>Subject</th>

                    <th>Status</th>

                    <th>Password</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="teacherTable">

                <tr>

                    <td colspan="6">
                        Loading Teachers...
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <div class="footer">

        © 2026 Academic Heights Public School

    </div>

</div>

<script type="module" src="../js/teachers.js"></script>

</body>
</html>
