<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AHPS Online Examination System</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f7fc;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    font-size:30px;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    text-align:center;
}

.card i{
    font-size:40px;
    color:#1e3a8a;
    margin-bottom:10px;
}

.card h2{
    font-size:28px;
    color:#333;
}

.card p{
    color:#777;
}

.actions{
    margin-top:30px;
}

.actions h2{
    margin-bottom:15px;
}

.action-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.action-btn{
    background:#1e3a8a;
    color:white;
    text-decoration:none;
    padding:15px;
    text-align:center;
    border-radius:10px;
    transition:.3s;
}

.action-btn:hover{
    background:#14296b;
}

.logout{
    margin-top:30px;
    background:#dc2626;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.logout:hover{
    background:#b91c1c;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#666;
}

</style>
</head>
<body>

<div class="header">
    <h1>AHPS Online Examination System</h1>
    <p>Administrator Dashboard</p>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <i class="fas fa-user-graduate"></i>
            <h2 id="studentCount">0</h2>
            <p>Students</p>
        </div>

        <div class="card">
            <i class="fas fa-file-alt"></i>
            <h2 id="examCount">0</h2>
            <p>Exams</p>
        </div>

        <div class="card">
            <i class="fas fa-chart-bar"></i>
            <h2 id="resultCount">0</h2>
            <p>Results</p>
        </div>

        <div class="card">
            <i class="fas fa-check-circle"></i>
            <h2>Live</h2>
            <p>System Status</p>
        </div>

    </div>

    <div class="actions">

        <h2>Quick Actions</h2>

        <div class="action-grid">

            <a href="exams.html" class="action-btn">
                <i class="fas fa-plus"></i><br><br>
                Create Exam
            </a>

            <a href="questions.html" class="action-btn">
                <i class="fas fa-question-circle"></i><br><br>
                Question Bank
            </a>

            <a href="students.html" class="action-btn">
                <i class="fas fa-users"></i><br><br>
                Students
            </a>

            <a href="results.html" class="action-btn">
                <i class="fas fa-chart-line"></i><br><br>
                Results
            </a>

        </div>

    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>

    <div class="footer">
        © 2026 Academic Heights Public School
    </div>

</div>

<script>

function logout(){
    localStorage.clear();
    window.location.href="../login.html";
}

document.getElementById("studentCount").innerText = localStorage.getItem("studentCount") || 0;
document.getElementById("examCount").innerText = localStorage.getItem("examCount") || 0;
document.getElementById("resultCount").innerText = localStorage.getItem("resultCount") || 0;

</script>

</body>
</html>
