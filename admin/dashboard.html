<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AHPS Assessment Management System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:42px;
}

.header p{
    font-size:18px;
    margin-top:8px;
}

.container{
    width:95%;
    margin:25px auto;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card i{
    font-size:50px;
    color:#1e3a8a;
    margin-bottom:15px;
}

.card h2{
    font-size:48px;
    color:#111;
}

.card p{
    font-size:26px;
    color:#555;
}

.quick-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.action-btn{
    background:#1e3a8a;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:25px;
    border-radius:12px;
    font-size:24px;
    transition:.3s;
}

.action-btn:hover{
    background:#14296b;
}

.action-btn i{
    display:block;
    font-size:35px;
    margin-bottom:10px;
}

.bottom{
    margin-top:30px;
}

.logout{
    background:red;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.settings{
    background:#444;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-left:10px;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#444;
    font-size:22px;
}

</style>
</head>

<body>

<div class="header">
    <h1>AHPS Assessment Management System</h1>
    <p>Admin & Assessment Control Panel</p>
</div>

<div class="container">

    <div class="stats">

        <div class="card">
            <i class="fas fa-user-graduate"></i>
            <h2 id="studentCount">0</h2>
            <p>Students</p>
        </div>

        <div class="card">
            <i class="fas fa-file-alt"></i>
            <h2 id="examCount">0</h2>
            <p>Assessments</p>
        </div>

        <div class="card">
            <i class="fas fa-chart-line"></i>
            <h2 id="resultCount">0</h2>
            <p>Results</p>
        </div>

        <div class="card">
            <i class="fas fa-circle-check"></i>
            <h2>Live</h2>
            <p>System Status</p>
        </div>

    </div>

    <div class="quick-title">
        Quick Actions
    </div>

    <div class="actions">

        <a href="exams.html" class="action-btn">
            <i class="fas fa-plus"></i>
            Create Assessment
        </a>

        <a href="questions.html" class="action-btn">
            <i class="fas fa-question-circle"></i>
            Question Bank
        </a>

        <a href="students.html" class="action-btn">
            <i class="fas fa-user-graduate"></i>
            Students
        </a>

        <a href="teachers.html" class="action-btn">
            <i class="fas fa-chalkboard-teacher"></i>
            Teachers
        </a>

        <a href="results.html" class="action-btn">
            <i class="fas fa-chart-line"></i>
            Results
        </a>

        <a href="settings.html" class="action-btn">
            <i class="fas fa-cog"></i>
            Settings
        </a>

    </div>

    <div class="bottom">

        <button
            class="logout"
            onclick="logout()">
            Logout
        </button>

        <button
            class="settings"
            onclick="location.href='settings.html'">
            Settings
        </button>

    </div>

    <div class="footer">
        © 2026 Academic Heights Public School
    </div>

</div>

<script>

function logout(){

    localStorage.clear();

    window.location.href =
    "../login.html";
}

</script>
<script src="../js/auth-check.js"></script>
    <script src="../js/admin-guard.js"></script>
<script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
