<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Assessment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#001f5b;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    background:#001f5b;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.back-btn:hover{
    background:#003399;
}

input,
select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.create-btn{
    width:100%;
    padding:12px;
    background:#001f5b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.create-btn:hover{
    background:#003399;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,
td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#001f5b;
    color:white;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover{
    background:darkred;
}

.status-student{
    color:green;
    font-weight:bold;
}

.status-teacher{
    color:orange;
    font-weight:bold;
}

.status-both{
    color:blue;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h1>Assessment Management</h1>
</div>

<div class="container">

    <a href="dashboard.html" class="back-btn">
        ← Back To Dashboard
    </a>

    <input
        type="text"
        id="examName"
        placeholder="Assessment Name">

    <input
        type="text"
        id="subject"
        placeholder="Subject">

    <select id="targetType">

        <option value="student">
            Students Only
        </option>

        <option value="teacher">
            Teachers Only
        </option>

        <option value="both">
            Students & Teachers
        </option>

    </select>

    <select id="examClass">

        <option value="">
            Select Class
        </option>

        <option value="Nursery">Nursery</option>
        <option value="LKG">LKG</option>
        <option value="UKG">UKG</option>

        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="5">Class 5</option>
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="11">Class 11</option>
        <option value="12">Class 12</option>

    </select>

    <input
        type="number"
        id="duration"
        placeholder="Duration (Minutes)">

    <input
        type="number"
        id="totalMarks"
        placeholder="Total Marks">

    <label>
        Start Date
    </label>

    <input
        type="date"
        id="startDate">

    <label>
        End Date
    </label>

    <input
        type="date"
        id="endDate">

    <button
        class="create-btn"
        onclick="createExam()">

        Create Assessment

    </button>

    <table>

        <thead>

            <tr>

                <th>Assessment</th>
                <th>Subject</th>
                <th>Target</th>
                <th>Class</th>
                <th>Duration</th>
                <th>Total Marks</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="examTable">

            <tr>

                <td colspan="7">

                    Loading Assessments...

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script type="module" src="../js/exams.js"></script>

</body>
</html>
