<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assessment Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#001f5b;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    max-width:1200px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    background:#001f5b;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:5px;
}

.back-btn:hover{
    background:#003399;
}

input,
select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.create-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#001f5b;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.create-btn:hover{
    background:#003399;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#001f5b;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="header">
    <h1>Assessment Management</h1>
</div>

<div class="container">

    <a href="dashboard.html" class="back-btn">
        ← Back To Dashboard
    </a>

    <div class="card">

        <h2>Create Assessment</h2>

        <input
            type="text"
            id="examName"
            placeholder="Assessment Name">

        <input
            type="text"
            id="subject"
            placeholder="Subject">

        <select id="targetType">

            <option value="">
                Select Target
            </option>

            <option value="student">
                Students
            </option>

            <option value="teacher">
                Teachers
            </option>

            <option value="all">
                Students & Teachers
            </option>

        </select>

        <select id="examClass">

            <option value="">
                Select Class
            </option>

        </select>

        <input
            type="number"
            id="duration"
            placeholder="Duration (Minutes)">

        <input
            type="number"
            id="totalMarks"
            placeholder="Total Marks">

        <input
            type="date"
            id="startDate">

        <input
            type="date"
            id="endDate">

        <button
            class="create-btn"
            onclick="createExam()">

            Create Assessment

        </button>

    </div>

    <div class="card">

        <h2>Assessment List</h2>

        <table>

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Subject</th>
                    <th>Target</th>
                    <th>Class</th>
                    <th>Duration</th>
                    <th>Marks</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="examTable">

                <tr>

                    <td colspan="7">
                        Loading Assessments...
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="js/auth-check.js"></script>
<script type="module" src="js/exam.js"></script>

</body>
</html>
```
