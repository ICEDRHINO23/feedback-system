```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Question Bank</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#001f5b;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,
select,
textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:120px;
resize:none;
}

button{
background:#001f5b;
color:white;
border:none;
padding:12px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#003399;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#001f5b;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.delete-btn{
background:red;
}

.edit-btn{
background:orange;
margin-right:5px;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
background:#001f5b;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:5px;
}

#multipleSection{
padding:10px;
background:#f8f8f8;
border-radius:5px;
margin-bottom:10px;
}

#multipleSection label{
display:block;
margin-bottom:8px;
}

#multipleSection input{
width:auto;
margin-right:10px;
}

</style>
</head>

<body>

<div class="header">
<h1>Question Bank</h1>
</div>

<div class="container">

<a href="dashboard.html" class="back-btn">
← Back to Dashboard
</a>

<input
type="hidden"
id="questionId">

<select id="examSelect">
<option value="">
Select Exam
</option>
</select>

<select id="questionType">

<option value="mcq">
Single MCQ
</option>

<option value="multiple">
Multiple Answer
</option>

<option value="sentence">
Sentence Answer
</option>

</select>

<textarea
id="question"
placeholder="Enter Question">
</textarea>

<div id="optionSection">

<input
type="text"
id="optionA"
placeholder="Option A">

<input
type="text"
id="optionB"
placeholder="Option B">

<input
type="text"
id="optionC"
placeholder="Option C">

<input
type="text"
id="optionD"
placeholder="Option D">

</div>

<!-- Single MCQ -->

<div id="mcqSection">

<select id="answer">

<option value="">
Correct Answer
</option>

<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>

</select>

</div>

<!-- Multiple Answer -->

<div
id="multipleSection"
style="display:none;">

<h4>
Select Correct Answers
</h4>

<label>
<input
type="checkbox"
id="ansA">
Option A
</label>

<label>
<input
type="checkbox"
id="ansB">
Option B
</label>

<label>
<input
type="checkbox"
id="ansC">
Option C
</label>

<label>
<input
type="checkbox"
id="ansD">
Option D
</label>

</div>

<!-- Sentence Answer -->

<div
id="sentenceSection"
style="display:none;">

<textarea
id="modelAnswer"
placeholder="Enter Model Answer">
</textarea>

</div>

<input
type="number"
id="marks"
placeholder="Marks">

<button onclick="saveQuestion()">
Save Question
</button>

<table>

<thead>

<tr>

<th>
Question
</th>

<th>
Type
</th>

<th>
Answer
</th>

<th>
Marks
</th>

<th>
Action
</th>

</tr>

</thead>

<tbody id="questionTable">

<tr>

<td colspan="5">

Loading Questions...

</td>

</tr>

</tbody>

</table>

</div>

<script>

document
.getElementById("questionType")
.addEventListener(
"change",
function(){

const type =
this.value;

document.getElementById(
"mcqSection"
).style.display = "none";

document.getElementById(
"multipleSection"
).style.display = "none";

document.getElementById(
"sentenceSection"
).style.display = "none";

if(type === "mcq"){

document.getElementById(
"mcqSection"
).style.display =
"block";

}

if(type === "multiple"){

document.getElementById(
"multipleSection"
).style.display =
"block";

}

if(type === "sentence"){

document.getElementById(
"sentenceSection"
).style.display =
"block";

}

});

</script>

<script
type="module"
src="../js/questions.js">
</script>

</body>
</html>
```
