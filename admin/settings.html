
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#001f5b;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:90%;
    max-width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    background:#001f5b;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#003399;
}

.back-btn{
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    background:#001f5b;
    color:white;
    padding:10px 15px;
    border-radius:5px;
}

</style>

</head>
<body>

<div class="header">
    <h1>System Settings</h1>
</div>

<div class="container">

    <a href="dashboard.html" class="back-btn">
        ← Back to Dashboard
    </a>

    <label>Academic Year</label>
    <input type="text" id="academicYear">

    <label>Account Expiry Date</label>
    <input type="date" id="accountExpiry">

    <label>Classes (comma separated)</label>
    <textarea id="classes" rows="3"></textarea>

    <label>Sections (comma separated)</label>
    <textarea id="sections" rows="3"></textarea>

    <button onclick="saveSettings()">
        Save Settings
    </button>

</div>

<script type="module" src="../js/settings.js"></script>

</body>
</html>
