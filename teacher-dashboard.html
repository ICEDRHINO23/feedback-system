<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#001f5b;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:95%;
    max-width:1200px;
    margin:20px auto;
}

.welcome-card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card i{
    font-size:40px;
    color:#001f5b;
    margin-bottom:10px;
}

.card h2{
    font-size:32px;
    color:#001f5b;
}

.card p{
    color:#666;
}

.section-title{
    font-size:24px;
    margin-bottom:15px;
    color:#001f5b;
}

#assessmentList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.assessment-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.assessment-card h3{
    color:#001f5b;
    margin-bottom:10px;
}

.assessment-card p{
    margin:5px 0;
}

.start-btn{
    margin-top:10px;
    background:#001f5b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.start-btn:hover{
    background:#003399;
}

.logout-btn{
    margin-top:20px;
    background:red;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#666;
}

</style>
</head>

<body>

<div class="header">
    <h1>AHPS Assessment Management System</h1>
    <p>Teacher Dashboard</p>
</div>

<div class="container">

    <div class="welcome-card">

        <h2 id="teacherName">
            Welcome Teacher
        </h2>

        <p>
            Subject:
            <span id="teacherSubject">
            </span>
        </p>

    </div>

    <div class="stats">

        <div class="card">
            <i class="fas fa-file-alt"></i>
            <h2 id="examCount">0</h2>
            <p>Available Assessments</p>
        </div>

        <div class="card">
            <i class="fas fa-chart-line"></i>
            <h2 id="resultCount">0</h2>
            <p>Completed Assessments</p>
        </div>

    </div>

    <div class="section-title">
        Teacher Assessments
    </div>

    <div id="assessmentList">

        Loading Assessments...

    </div>

    <button
        class="logout-btn"
        onclick="logout()">
        Logout
    </button>

</div>

<div class="footer">
    © 2026 Academic Heights Public School
</div>

<script>

document.getElementById(
"teacherName"
).innerHTML =
"Welcome " +
(
localStorage.getItem(
"teacherName"
) || "Teacher"
);

document.getElementById(
"teacherSubject"
).innerHTML =
localStorage.getItem(
"teacherSubject"
) || "";

function logout(){

    localStorage.clear();

    window.location.href =
    "teacher-login.html";
}

</script>

<script type="module"
src="js/teacher-dashboard.js">
</script>

</body>
</html>
